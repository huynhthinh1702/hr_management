{% extends "base.html" %}

{% block title %}{{ _('Register') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-4" data-i18n="Register">Register</h1>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Full Name">Full Name</label>
                        <input type="text" name="full_name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Username">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Email">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Password">Password</label>
                        <input type="password" name="password" class="form-control" minlength="8" required>
                        <div class="form-text" data-i18n="At least 8 characters with uppercase, lowercase, number, and special character.">At least 8 characters with uppercase, lowercase, number, and special character.</div>
                    </div>
                    <button class="btn btn-primary w-100" data-i18n="Register">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
