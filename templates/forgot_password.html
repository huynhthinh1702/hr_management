{% extends "base.html" %}

{% block title %}{{ _('Forgot Password') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h3 mb-4" data-i18n="Forgot Password">Forgot Password</h1>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Full Name">Full Name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="Email">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button class="btn btn-primary w-100" data-i18n="Send Request">Send Request</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none" data-i18n="Back to login">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
