{% extends "base.html" %}

{% block title %}{{ _('Update Task') }}{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body">
    <h1 class="mb-4" data-i18n="Update Task">Update Task</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">

            <label data-i18n="Status">Status</label>

            <select
                name="status"
                class="form-control"
            >

                <option value="Pending" {% if task.status == "Pending" %}selected{% endif %} data-i18n="Pending">
                    Pending
                </option>

                <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %} data-i18n="In Progress">
                    In Progress
                </option>

                <option value="Completed" {% if task.status == "Completed" %}selected{% endif %} data-i18n="Completed">
                    Completed
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label data-i18n="Progress (%)">Progress (%)</label>

            <input
                type="number"
                name="progress"
                class="form-control"
                value="{{ task.progress }}"
            >

        </div>

        <button class="btn btn-success" data-i18n="Update">
            Update
        </button>

    </form>
    </div>
</div>
{% endblock %}
